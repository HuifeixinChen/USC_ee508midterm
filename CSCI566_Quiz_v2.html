<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#222;line-height:1.5;padding:12px}
.container{max-width:900px;margin:0 auto}
h1{text-align:center;margin:10px 0 4px;font-size:1.5em}
.subtitle{text-align:center;color:#555;font-size:0.85em;margin-bottom:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;position:sticky;top:0;background:#f5f5f5;padding:8px 0;z-index:10;border-bottom:2px solid #ddd}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:0.9em;font-weight:600;transition:background .2s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-warn{background:#f59e0b;color:#fff}.btn-warn:hover{background:#d97706}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-outline{background:#fff;color:#333;border:1.5px solid #ccc}.btn-outline:hover{background:#eee}
.scoreboard{text-align:center;font-size:1.1em;margin:10px 0;padding:10px;background:#fff;border-radius:8px;border:1px solid #ddd;display:none}
.scoreboard.show{display:block}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;margin:6px 0 10px;overflow:hidden}
.progress-fill{height:100%;background:#2563eb;transition:width .3s;border-radius:3px}
.q-card{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:12px;border:1.5px solid #e5e7eb;transition:border-color .3s}
.q-card.correct{border-color:#22c55e;background:#f0fdf4}
.q-card.wrong{border-color:#ef4444;background:#fef2f2}
.q-card.unanswered{border-color:#f59e0b;background:#fffbeb}
.q-num{font-weight:700;font-size:1em;color:#2563eb;margin-bottom:4px}
.q-text{font-size:0.95em;margin-bottom:10px;white-space:pre-wrap}
.q-hint{font-size:0.8em;color:#888;margin-bottom:6px;font-style:italic}
.options{display:flex;flex-direction:column;gap:5px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;border:1.5px solid #e5e7eb;transition:all .2s;font-size:0.92em}
.opt:hover{background:#f0f4ff;border-color:#93b5fd}
.opt.selected{background:#dbeafe;border-color:#3b82f6}

.explanation.show{display:block}
.tag{display:inline-block;font-size:0.7em;padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:600}
.tag-easy{background:#dcfce7;color:#166534}
.tag-medium{background:#fef9c3;color:#854d0e}
.tag-hard{background:#fee2e2;color:#991b1b}
.stat-row{display:flex;justify-content:center;gap:20px;font-size:0.9em;margin:4px 0}
.stat-correct{color:#16a34a;font-weight:600}
.stat-wrong{color:#dc2626;font-weight:600}
.stat-skip{color:#d97706;font-weight:600}
.analysis{margin-top:10px;padding:10px;border:1px solid #d1d5db;border-radius:8px;background:#fcfcfd;text-align:left}
.analysis h3{font-size:0.95em;margin-bottom:6px}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.analysis table{width:100%;border-collapse:collapse;font-size:0.82em}
.analysis th,.analysis td{border:1px solid #e5e7eb;padding:4px 6px;text-align:left}
.analysis th{background:#f3f4f6}
.weak-list{font-size:0.85em;line-height:1.4}
@media(max-width:600px){body{padding:6px}.q-card{padding:12px}.controls{gap:4px}button{padding:6px 10px;font-size:0.8em}}

<p class="subtitle">50 Single-Choice Questions &bull; Choose the ONE correct answer &bull; Calculator Allowed<br>Focused on NN, CNN, RNN/LSTM, GNN, GAN/VAE, backprop, unsupervised learning, training tricks, and regularization</p>

<script>
const questions = [
{id:1,text:'Which of the following is a supervised learning task?',opts:['(A) Grouping unlabeled samples into clusters','(B) Learning low-dimensional structure from unlabeled data','(C) Classifying samples into fixed categories using labeled data','(D) Modeling the data distribution with density estimation'],ans:2,topic:'W1: ML Basics',diff:'easy',expl:'Supervised learning requires labeled targets. Classification with labels is supervised; clustering, dimensionality reduction, and density estimation are unsupervised.'},
{id:2,text:'Which of the following is an unsupervised learning task?',opts:['(A) Predicting a continuous target from labeled examples','(B) Classifying emails as spam using labeled training data','(C) Predicting labels for nodes given labeled training nodes','(D) Clustering unlabeled samples by similarity'],ans:3,topic:'W1: ML Basics',diff:'easy',expl:'Clustering unlabeled data does not use target labels, making it unsupervised.'},
{id:3,text:'For a linear classifier f(x)=Wx+b with input dimension D and C classes, which is correct?',opts:['(A) W has shape D × C','(B) Adding bias b makes the classifier nonlinear','(C) Stacking linear layers without nonlinearities still gives only a linear map','(D) b has length D'],ans:2,topic:'W1: ML Basics',diff:'medium',expl:'W is C×D (not D×C), b has length C (not D), and bias keeps the model linear. Stacking linear layers without nonlinearities collapses to a single linear transformation.'},
{id:4,text:'A model has very low training error but much higher validation error. What is the most likely diagnosis?',opts:['(A) Underfitting','(B) Overfitting','(C) Data leakage','(D) The learning rate is too low'],ans:1,topic:'W1: Generalization',diff:'easy',expl:'Low training error plus high validation error is the classic overfitting pattern.'},
{id:5,text:'A model has high training error and high validation error. What is the most likely issue?',opts:['(A) Overfitting','(B) Data leakage','(C) Underfitting','(D) Too much regularization causing overconfidence'],ans:2,topic:'W1: Generalization',diff:'easy',expl:'High error on both training and validation sets usually indicates underfitting — the model lacks capacity or is over-regularized.'},
{id:6,text:'In a GNN, what does link prediction aim to do?',opts:['(A) Predict a label for each node','(B) Predict a single label for the entire graph','(C) Predict whether an edge should exist between two nodes','(D) Change the predicted label when nodes are reordered'],ans:2,topic:'W8: GNN',diff:'easy',expl:'Link prediction estimates the likelihood that an edge exists between two nodes. Node classification and graph classification are different tasks.'},
{id:7,text:'Which is a major drawback of sigmoid as a hidden-layer activation?',opts:['(A) Its output range is [−1, 1]','(B) It is zero-centered','(C) It never saturates','(D) It can saturate and cause vanishing gradients'],ans:3,topic:'W3: Activations',diff:'medium',expl:'Sigmoid outputs lie in (0,1) (not [−1,1]), is not zero-centered, and does saturate at extreme values, causing vanishing gradients.'},
{id:8,text:'Which statement correctly compares tanh and standard ReLU?',opts:['(A) Standard ReLU is zero-centered','(B) Tanh outputs lie in [0, 1]','(C) Tanh is zero-centered','(D) ReLU saturates on the positive side'],ans:2,topic:'W3: Activations',diff:'medium',expl:'Tanh outputs are in [−1,1] and centered around zero. Standard ReLU is not zero-centered and does not saturate for positive inputs.'},
{id:9,text:'Which activation–output pairing is appropriate?',opts:['(A) Softmax for ordinary scalar regression','(B) Sigmoid for multi-class (>2) classification','(C) ReLU as the final output for probability estimation','(D) Softmax for multi-class classification output'],ans:3,topic:'W3: Activations',diff:'easy',expl:'Softmax produces a probability distribution over classes and is standard for multi-class classification.'},
{id:10,text:'For sigmoid σ(z) = 1/(1+e^{−z}), what is σ′(0)?',opts:['(A) 0','(B) 0.5','(C) 0.25','(D) 1'],ans:2,topic:'W3: Activations',diff:'medium',expl:'σ′(z) = σ(z)(1−σ(z)). At z=0, σ(0)=0.5, so σ′(0) = 0.5×0.5 = 0.25.'},
{id:11,text:'Why are nonlinear activations essential in neural networks?',opts:['(A) They guarantee global optima in training','(B) They eliminate the need for proper initialization','(C) Without them, stacking layers still gives only a linear map','(D) They make the loss function convex'],ans:2,topic:'W3: Activations',diff:'medium',expl:'Without nonlinearities, composing multiple linear layers yields another linear map with no added expressiveness.'},
{id:12,text:'What is the main purpose of leaky ReLU compared to standard ReLU?',opts:['(A) To eliminate the need for bias terms','(B) To reduce the dying-ReLU problem by keeping a non-zero negative slope','(C) To make the network linear','(D) To replace batch normalization'],ans:1,topic:'W3: Activations',diff:'medium',expl:'Leaky ReLU keeps a small slope for negative inputs, preventing neurons from permanently dying (outputting zero for all inputs).'},
{id:13,text:'What does the chain rule enable in backpropagation?',opts:['(A) Avoiding derivatives altogether','(B) Computing only the Hessian matrix','(C) Efficient gradient computation through composed functions','(D) Guaranteeing zero training loss'],ans:2,topic:'W4: Backprop',diff:'easy',expl:'The chain rule decomposes the gradient of composed functions into products of local derivatives, enabling efficient layer-by-layer backward computation.'},
{id:14,text:'For the add gate f(x,y) = x + y, how does the upstream gradient flow?',opts:['(A) It is halved and sent to each input','(B) It is multiplied by the other input value','(C) The gate must cache x and y to compute local derivatives','(D) It is copied unchanged to both inputs'],ans:3,topic:'W4: Backprop',diff:'easy',expl:'The partial derivatives of an add gate are both 1, so the upstream gradient passes through unchanged to both inputs. No caching is needed.'},
{id:15,text:'For the multiply gate f(x,y) = xy, what is ∂f/∂x?',opts:['(A) x','(B) 1','(C) y','(D) xy'],ans:2,topic:'W4: Backprop',diff:'easy',expl:'The partial derivative of xy with respect to x is y. The forward values must be cached because the local derivatives depend on the other input.'},
{id:16,text:'For the max gate f(x,y) = max(x,y), how does gradient flow?',opts:['(A) Both inputs receive half the gradient','(B) Both inputs receive the full gradient','(C) Only the larger input receives the upstream gradient; the other gets zero','(D) Gradient flows to the smaller input only'],ans:2,topic:'W4: Backprop',diff:'easy',expl:'A max gate routes the full upstream gradient to whichever input was larger (the "winner"), and gives zero gradient to the other.'},
{id:17,text:'For Y = XW + b (X: N×D, W: D×M), what is the correct expression for dW?',opts:['(A) dY Xᵀ','(B) X dY','(C) Xᵀ dY','(D) dY Wᵀ'],ans:2,topic:'W4: Backprop',diff:'medium',expl:'dW = Xᵀ dY (shape D×M). dX = dY Wᵀ is the gradient with respect to the input.'},
{id:18,text:'Why are intermediate values cached during the forward pass?',opts:['(A) To replace model parameters during testing','(B) Because some local gradients depend on forward-pass values','(C) To reduce the number of layers needed','(D) To avoid the chain rule during backprop'],ans:1,topic:'W4: Backprop',diff:'medium',expl:'Many backward computations (e.g., multiply gates, activation derivatives) require the input values computed during the forward pass.'},
{id:19,text:'What causes vanishing gradients in deep networks?',opts:['(A) The loss being exactly zero','(B) Too large a learning rate','(C) Repeated multiplication by factors smaller than 1','(D) Having too few layers'],ans:2,topic:'W4: Backprop',diff:'medium',expl:'When gradients are repeatedly multiplied by values less than 1 (e.g., saturating activation derivatives), they shrink exponentially, making early layers hard to train.'},
{id:20,text:'What is the standard formula for convolution output size?',opts:['(A) W − F + P','(B) W / S − F + 1','(C) (W − F + 2P) / S + 1','(D) (W + F − 2P) / S'],ans:2,topic:'W4: CNN',diff:'easy',expl:'The standard formula is (W − F + 2P)/S + 1, where W is input size, F is filter size, P is padding, S is stride.'},
{id:21,text:'A conv layer takes a 4×6 input with 3 channels and outputs a 3×4×10 volume. How many filters does it use?',opts:['(A) 3','(B) 4','(C) 10','(D) 6'],ans:2,topic:'W4: CNN',diff:'medium',expl:'The output depth (10) equals the number of filters. Each filter spans all 3 input channels.'},
{id:22,text:'A 32×32×3 input is convolved with six 5×5 filters, stride 1, padding 0. What is the output spatial size?',opts:['(A) 32×32','(B) 30×30','(C) 28×28','(D) 27×27'],ans:2,topic:'W4: CNN',diff:'medium',expl:'Using (32−5+0)/1+1 = 28. The output is 28×28×6.'},
{id:23,text:'Ten 5×5 filters on a 3-channel input with one bias per filter. What is the total parameter count?',opts:['(A) 750','(B) 760','(C) 250','(D) 780'],ans:1,topic:'W4: CNN',diff:'medium',expl:'Each filter: 5×5×3 = 75 weights + 1 bias = 76 params. Total: 10 × 76 = 760.'},
{id:24,text:'Which statement about pooling layers is correct?',opts:['(A) Max pooling increases the channel count','(B) Pooling adds many learnable parameters','(C) Pooling increases spatial resolution','(D) Max pooling typically has no learnable parameters'],ans:3,topic:'W4: CNN',diff:'easy',expl:'Pooling reduces spatial dimensions without adding learnable parameters. It does not change channel count.'},
{id:25,text:'Why are two 3×3 conv layers often preferred over one 5×5 conv layer?',opts:['(A) One 5×5 layer always uses fewer parameters','(B) Two 3×3 layers achieve a smaller receptive field','(C) They achieve a similar receptive field with fewer parameters and an extra nonlinearity','(D) Two 3×3 layers remove the need for activation functions'],ans:2,topic:'W4: CNN',diff:'medium',expl:'Two stacked 3×3 layers cover a 5×5 receptive field using 2×(3×3)=18 vs 25 weights per channel, plus an extra nonlinearity between them.'},
{id:26,text:'What is a key effect of padding in convolution?',opts:['(A) It increases the number of filters','(B) It changes the activation function','(C) It can preserve spatial size when stride is 1','(D) It removes the need for bias terms'],ans:2,topic:'W4: CNN',diff:'easy',expl:'Padding adds zeros around the input border, allowing the output spatial size to match the input when S=1 and P=(F−1)/2.'},
{id:27,text:'For input width W=9, filter size F=3, stride S=2, what padding P is needed for output width 9?',opts:['(A) P = 0','(B) P = 1','(C) P = 3','(D) P = 5'],ans:3,topic:'W4: CNN',diff:'medium',expl:'Solve (9−3+2P)/2+1=9 → (6+2P)/2=8 → 6+2P=16 → P=5.'},
{id:28,text:'How do residual (skip) connections help in deep networks?',opts:['(A) They remove the need for nonlinear activations','(B) They replace batch normalization','(C) They provide shortcut paths for gradient flow, easing optimization','(D) They guarantee convergence in 1 epoch'],ans:2,topic:'W4: CNN',diff:'medium',expl:'Residual connections add identity shortcuts that allow gradients to flow more directly, making very deep networks easier to train.'},
{id:29,text:'Vanilla RNN: h_t = tanh(W_hh h_{t−1} + W_xh x_t + b), d_x=10, d_h=20. What is the total parameter count?',opts:['(A) 420','(B) 600','(C) 620','(D) 820'],ans:2,topic:'W5: RNN',diff:'medium',expl:'W_hh: 20×20=400, W_xh: 20×10=200, b: 20. Total = 400+200+20 = 620.'},
{id:30,text:'In a standard RNN, what happens to the trainable parameters as sequence length T increases?',opts:['(A) They increase proportionally with T','(B) They double with each time step','(C) They remain the same — weights are shared across time','(D) They decrease as T increases'],ans:2,topic:'W5: RNN',diff:'medium',expl:'RNN parameters are shared (reused) at every time step. Longer sequences increase computation but not the number of trainable parameters.'},
{id:31,text:'An RNN is unrolled for 4 steps; the loss depends on h_4. Which is correct?',opts:['(A) Only parameters at step 4 receive gradient','(B) Gradient cannot propagate beyond h_3','(C) Earlier hidden states h_1, h_2, h_3 cannot influence the loss','(D) BPTT applies the chain rule through the entire unrolled graph'],ans:3,topic:'W5: RNN',diff:'medium',expl:'Backpropagation through time (BPTT) propagates gradients from the loss through every time step in the unrolled graph; shared parameters accumulate gradient contributions.'},
{id:32,text:'What is gradient clipping primarily used for in RNN training?',opts:['(A) Fixing vanishing gradients','(B) Preventing exploding gradients','(C) Replacing LSTM gating','(D) Making the model bidirectional'],ans:1,topic:'W5: RNN',diff:'medium',expl:'Gradient clipping caps gradient norms to prevent the exploding gradient problem. It does not address vanishing gradients — LSTM gating helps with that.'},
{id:33,text:'What is the key architectural feature that lets LSTMs handle longer dependencies than vanilla RNNs?',opts:['(A) Removing nonlinearities from recurrence','(B) Using fully connected layers instead of recurrence','(C) A gated memory cell with additive updates','(D) Eliminating all gate mechanisms'],ans:2,topic:'W5: LSTM',diff:'medium',expl:'LSTMs use a cell state that is updated additively through input and forget gates, creating a more direct path for information and gradient flow over long sequences.'},
{id:34,text:'Which activation function is commonly used by LSTM gates (forget, input, output)?',opts:['(A) ReLU','(B) Tanh','(C) Sigmoid','(D) Softmax'],ans:2,topic:'W5: LSTM',diff:'medium',expl:'LSTM gates (forget, input, output) use sigmoid to produce values in (0,1) for gating. The candidate cell update uses tanh.'},
{id:35,text:'Which statement about autoregressive generation is correct?',opts:['(A) All tokens are generated simultaneously','(B) Future tokens are available during left-to-right generation','(C) Generation proceeds token by token, feeding previous outputs to later steps','(D) Bidirectional context is used at each generation step'],ans:2,topic:'W5: Sequence Modeling',diff:'medium',expl:'Autoregressive generation produces one token at a time, using previously generated tokens as input. Future context is not available.'},
{id:36,text:'Sentiment classification (mapping a sentence to a label) is which type of sequence task?',opts:['(A) One-to-many','(B) Many-to-many','(C) Many-to-one','(D) One-to-one'],ans:2,topic:'W5: Sequence Modeling',diff:'easy',expl:'Sentiment classification takes a sequence (many tokens) and produces a single label — a many-to-one mapping.'},
{id:37,text:'With vocabulary V=10,000 and embedding dim d=300, what is the shape of the embedding matrix?',opts:['(A) 300 × 10000','(B) 10000 × 10000','(C) 10000 × 300','(D) 300 × 300'],ans:2,topic:'W5: Sequence Modeling',diff:'easy',expl:'The embedding matrix stores one 300-dimensional vector per token, so its shape is V × d = 10000 × 300.'},
{id:38,text:'At random initialization with K=10 classes and softmax output, what is the expected initial cross-entropy loss?',opts:['(A) ≈ 0','(B) ≈ 1.0','(C) ≈ 2.3','(D) ≈ 10.0'],ans:2,topic:'W7: Training Basics',diff:'medium',expl:'With near-uniform predictions, each class probability ≈ 1/10 = 0.1, so cross-entropy ≈ −log(0.1) = log(10) ≈ 2.3.'},
{id:39,text:'What statistics does batch normalization use at test time?',opts:['(A) Current test-batch statistics','(B) Running statistics accumulated during training','(C) No statistics — BN is disabled at test time','(D) Fixed constants independent of the data'],ans:1,topic:'W7: Batch Norm',diff:'medium',expl:'During inference, BN uses running mean and variance accumulated during training, not current batch statistics.'},
{id:40,text:'During training, batch normalization normalizes using:',opts:['(A) The global dataset mean and variance','(B) Fixed constant statistics','(C) The current mini-batch mean and variance','(D) Statistics from the test set'],ans:2,topic:'W7: Batch Norm',diff:'medium',expl:'During training, BN computes the mean and variance from the current mini-batch to normalize activations.'},
{id:41,text:'Gradient clipping is mainly used for which purpose?',opts:['(A) Guaranteeing convex optimization','(B) Directly fixing vanishing gradients','(C) Controlling exploding gradients','(D) Replacing the learning rate schedule'],ans:2,topic:'W7: Optimization',diff:'medium',expl:'Gradient clipping caps gradient norms to stabilize training when gradients become extremely large. It does not address vanishing gradients or convexity.'},
{id:42,text:'He initialization uses larger variance than Xavier initialization primarily because:',opts:['(A) It is designed for tanh activations','(B) Zero initialization is always preferred','(C) ReLU discards roughly half the signal (negative part), requiring larger initial variance','(D) It reduces model capacity'],ans:2,topic:'W7: Initialization',diff:'medium',expl:'He initialization accounts for the fact that ReLU zeros out negative activations, so higher variance is needed to maintain signal magnitude through layers.'},
{id:43,text:'Why is initializing all weights in a layer to the same constant problematic?',opts:['(A) It causes neurons to diverge too quickly','(B) It guarantees sparse solutions','(C) All neurons compute identical outputs and receive identical gradients, so symmetry is never broken','(D) It makes the learning rate irrelevant'],ans:2,topic:'W7: Initialization',diff:'medium',expl:'With identical weights, every neuron in the layer computes the same thing and receives the same gradient update, so they never learn distinct features.'},
{id:44,text:'In inverted dropout, what happens at test time?',opts:['(A) Units are still randomly dropped with smaller probability','(B) Activations are scaled down by the keep probability','(C) Nothing — the full network is used directly without extra scaling','(D) A different dropout mask is applied'],ans:2,topic:'W7: Regularization',diff:'medium',expl:'Inverted dropout scales up surviving activations during training so that at test time, no scaling or masking is needed.'},
{id:45,text:'Which is a useful sanity check when debugging a new neural network?',opts:['(A) If training loss drops once, all is correct','(B) Only check the final test accuracy','(C) Try to overfit a very small dataset to verify the model can learn','(D) Skip initial loss verification since it is always random'],ans:2,topic:'W7: Training Practice',diff:'medium',expl:'Overfitting a tiny dataset confirms the model has enough capacity and the training pipeline is correct. This is a standard debugging step.'},
{id:46,text:'Adam\'s bias correction addresses which problem?',opts:['(A) Gradient clipping','(B) Increasing learning rate over time','(C) The zero-initialization of moment estimates causes underestimation early in training','(D) Weight decay regularization'],ans:2,topic:'W7: Optimization',diff:'medium',expl:'Adam\'s first and second moment estimates start at zero and are biased low initially. Bias correction compensates so that early updates are properly scaled.'},
{id:47,text:'Why do many training schedules include a learning rate warm-up phase?',opts:['(A) To guarantee immediate convergence','(B) To replace the optimizer entirely','(C) To reduce early training instability when gradients are poorly scaled','(D) To increase the final training loss'],ans:2,topic:'W7: Optimization',diff:'medium',expl:'Warm-up gradually increases the learning rate from a small value, stabilizing early training when gradient statistics have not yet settled.'},
{id:48,text:'In message-passing GNNs, how is a node representation updated?',opts:['(A) Each node ignores its neighbors entirely','(B) A different update rule is used for every single node','(C) The output depends on the arbitrary indexing of the adjacency matrix','(D) Information from neighboring nodes is aggregated and combined with the node\'s own features'],ans:3,topic:'W8: GNN',diff:'medium',expl:'Message-passing GNNs update each node by aggregating messages from its neighbors using shared, symmetric operations (sum, mean, max) to ensure permutation invariance.'},
{id:49,text:'Why is the non-saturating generator loss preferred in GAN training?',opts:['(A) It turns GAN into maximum-likelihood estimation','(B) The original minimax loss always provides strong generator gradients','(C) When the discriminator is confident, the original loss can give very small generator gradients; the non-saturating version gives stronger signal','(D) It removes the adversarial framework'],ans:2,topic:'W8: GAN',diff:'medium',expl:'Under the original minimax loss, when D(G(z))≈0 the generator gradient vanishes. The non-saturating objective (max log D(G(z))) provides a stronger learning signal.'},
{id:50,text:'In a VAE, the reparameterization trick writes the latent variable as:',opts:['(A) z = σ · μ + ε, ε ~ N(0,1)','(B) z = μ + σ · ε, ε ~ N(0,1)','(C) z = μ − σ · ε, ε ~ N(0,1)','(D) z = ε / (μ + σ)'],ans:1,topic:'W8: GAN / VAE',diff:'hard',expl:'The reparameterization trick: z = μ + σ·ε where ε ~ N(0,1). This allows gradients to flow through the sampling step for training.'}];


// ===== Quiz Logic =====
const quizEl=document.getElementById('quiz'),scoreEl=document.getElementById('scoreboard'),progressEl=document.getElementById('progressFill');
let graded=false,showOnlyWrong=false,showExpl=false;

function weekOf(topic){
const m=(topic||'').match(/^W\d+/);
return m?m[0]:'Other';
}

function coverageTag(q){
return 'Core Coverage';
}

function pct(a,b){return b===0?'0.0':(100*a/b).toFixed(1);}

function buildAnalysisHtml(){
const byWeek={};
const byCoverage={'Core Coverage':{total:0,correct:0}};
questions.forEach(q=>{
const wk=weekOf(q.topic);
if(!byWeek[wk])byWeek[wk]={total:0,correct:0,wrong:0,skip:0};
byWeek[wk].total++;
if(q._result==='correct')byWeek[wk].correct++;
else if(q._result==='wrong')byWeek[wk].wrong++;
else byWeek[wk].skip++;

const tag=coverageTag(q);
byCoverage[tag].total++;
if(q._result==='correct')byCoverage[tag].correct++;
});

const weekRows=Object.keys(byWeek)
.sort((a,b)=>parseInt(a.slice(1)||999)-parseInt(b.slice(1)||999))
.map(w=>`<tr><td>${w}</td><td>${byWeek[w].correct}/${byWeek[w].total}</td><td>${pct(byWeek[w].correct,byWeek[w].total)}%</td></tr>`)
.join('');

const covRows=Object.keys(byCoverage)
.map(k=>`<tr><td>${k}</td><td>${byCoverage[k].correct}/${byCoverage[k].total}</td><td>${pct(byCoverage[k].correct,byCoverage[k].total)}%</td></tr>`)
.join('');

const weakWeeks=Object.keys(byWeek)
.map(w=>({w,acc:byWeek[w].correct/byWeek[w].total}))
.sort((a,b)=>a.acc-b.acc)
.slice(0,3)
.map(x=>`${x.w} (${(x.acc*100).toFixed(1)}%)`);

const weakQuestions=questions
.filter(q=>q._result==='wrong'||q._result==='unanswered')
.slice(0,8)
.map(q=>`Q${q.id} [${q.topic}]`)
.join(', ');

return `<div class="analysis"><h3>Attempt Analysis</h3>
<div class="analysis-grid">
<div><table><thead><tr><th>Week</th><th>Correct</th><th>Accuracy</th></tr></thead><tbody>${weekRows}</tbody></table></div>
<div><table><thead><tr><th>Coverage Group</th><th>Correct</th><th>Accuracy</th></tr></thead><tbody>${covRows}</tbody></table></div>
</div>
<div class="weak-list" style="margin-top:8px"><b>Weakest Weeks:</b> ${weakWeeks.join(' | ')||'N/A'}</div>
<div class="weak-list" style="margin-top:4px"><b>Review First:</b> ${weakQuestions||'None'}</div>
</div>`;
}

function render(){
quizEl.innerHTML='';let answered=0;
questions.forEach((q,qi)=>{
const card=document.createElement('div');
card.className='q-card'+(q._result==='correct'?' correct':q._result==='wrong'?' wrong':q._result==='unanswered'?' unanswered':'');
card.id='q'+q.id;
if(showOnlyWrong&&q._result==='correct'){card.style.display='none';}
const dt=q.diff==='easy'?'<span class="tag tag-easy">Easy</span>':q.diff==='medium'?'<span class="tag tag-medium">Medium</span>':'<span class="tag tag-hard">Hard</span>';
card.innerHTML=`<div class="q-num">Q${q.id}. <span style="color:#555;font-weight:400;font-size:0.85em">[${q.topic}]</span>${dt}</div>
<div class="q-hint">Choose the correct answer</div>
<div class="q-text">${q.text}</div>
<div class="options">${q.opts.map((o,oi)=>{
const sel=q._sel===oi;let cls='opt'+(sel?' selected':'');
if(graded){if(oi===q.ans&&sel)cls+=' correct-opt';else if(oi===q.ans&&!sel)cls+=' missed-opt';else if(oi!==q.ans&&sel)cls+=' wrong-opt';}
return`<label class="${cls}"><input type="radio" name="q${qi}" ${graded?'disabled':''}${sel?' checked':''} onchange="toggle(${qi},${oi})"><span>${o}</span></label>`;}).join('')}</div>
<div class="explanation${(showExpl||(graded&&q._result!=='correct'))?' show':''}">${graded?(q._result==='correct'?'✅ ':q._result==='wrong'?'❌ ':'⚠️ '):''}${q.expl}${graded?'<br><b>Answer: '+String.fromCharCode(65+q.ans)+'</b>':''}</div>`;
quizEl.appendChild(card);if(q._sel!==undefined&&q._sel!==null)answered++;});
progressEl.style.width=(answered/questions.length*100)+'%';}
function toggle(qi,oi){if(graded)return;questions[qi]._sel=oi;render();}
function grade(){graded=true;let c=0,w=0,u=0;
questions.forEach(q=>{
if(q._sel===undefined||q._sel===null){q._result='unanswered';u++;}
else if(q._sel===q.ans){q._result='correct';c++;}
else{q._result='wrong';w++;}});
scoreEl.className='scoreboard show';
scoreEl.innerHTML=`<b>Score: ${c}/${questions.length}</b> (${(c/questions.length*100).toFixed(1)}%)<div class="stat-row"><span class="stat-correct">✅ Correct: ${c}</span><span class="stat-wrong">❌ Wrong: ${w}</span><span class="stat-skip">⚠️ Skipped: ${u}</span></div>${buildAnalysisHtml()}`;
render();const s=document.createElement('style');s.textContent=`.correct-opt{background:#dcfce7!important;border-color:#22c55e!important}.wrong-opt{background:#fee2e2!important;border-color:#ef4444!important}.missed-opt{background:#fef9c3!important;border-color:#eab308!important}`;document.head.appendChild(s);
window.scrollTo({top:0,behavior:'smooth'});}
function showWrong(){showOnlyWrong=true;render();}
function showAll(){showOnlyWrong=false;render();}
function resetQuiz(){graded=false;showOnlyWrong=false;showExpl=false;questions.forEach(q=>{delete q._sel;delete q._result;});scoreEl.className='scoreboard';render();window.scrollTo({top:0,behavior:'smooth'});}
function toggleExplanations(){showExpl=!showExpl;render();}
render();
</script>
</body>
</html>
